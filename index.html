  <base href="/">

  <!-- Set theme color for browser UI -->
  <meta name="theme-color" content="#ffffff">
  <!-- Global App Configuration (must be loaded first) -->
  <script src="/src/utils/app-config.js"></script>
  <script>
    // This inline script runs before rendering to prevent a "flash of unstyled content" (FOUC).
    // It sets the theme class on the <html> element based on user preference or system settings.
    (function() {
      const preference = localStorage.getItem('app-theme');
      const systemIsDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      // Use saved preference; otherwise, fall back to system setting.
      const theme = preference || (systemIsDark ? 'dark' : 'light');
      
      document.documentElement.classList.add(`${theme}-mode`);
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">

<script>
  // Register the Service Worker (or unregister in dev mode)
  if ('serviceWorker' in navigator) {
    // This flag can be manually set to true in the console for PWA testing in dev mode.
    const forceSWInDev = true; 
    // Access the configuration from the global window.APP_CONFIG object.
    // This was causing a ReferenceError because `appMode` is not a global variable.
    const currentAppMode = window.APP_CONFIG?.appMode;

    if (currentAppMode === 'dev' && !forceSWInDev) {
      console.log('DEV MODE: Unregistering service worker.');
      navigator.serviceWorker.getRegistrations().then(registrations => {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
    } else {
      if (currentAppMode === 'dev' && forceSWInDev) {
        console.warn('DEV MODE: Service Worker is being registered for testing purposes.');
      }
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(registration => console.log('Service Worker registered successfully:', registration))
          .catch(error => console.error('Service Worker registration failed:', error));
      });
    }
  }
</script>

  <!-- 8. Scripts -->
  <!-- Use a modular script to keep the HTML clean -->
<script type="module">
  import { loadSmartPartials } from '/src/utils/partial-auto-loader.js';

  // Load all HTML partials first. Using .then/.catch is more robust than top-level await
  // as it provides a clear path for error handling if a partial fails to load.
  loadSmartPartials()
    .then(() => {
      // Once partials are successfully loaded, import and run the main application script.
      console.log("✅ All partials loaded, initializing main application script...");
      return import('/src/common/scripts/main-script.js');
    })
    .catch(error => {
      // This is a critical error. The app cannot start.
      // Display a user-friendly message directly in the body to avoid a blank screen.
      console.error("❌ CRITICAL: Failed to load essential app components. App cannot start.", error);
      document.body.innerHTML = `
        <div style="padding: 40px 20px; text-align: center; font-family: sans-serif; color: #333;">
          <h1 style="color: #d9534f;">Application Error</h1>
          <p>The application could not be started due to a critical error.</p>
          <p>Please try refreshing the page. If the problem persists, check the browser console for details.</p>
        </div>
      `;
    });
</script>
